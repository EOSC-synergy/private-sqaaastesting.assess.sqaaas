      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.bluebell_tranquil_seahorse.sh
        container: qc.sty_clementine_proactive_ibis
  QC.Uni:
