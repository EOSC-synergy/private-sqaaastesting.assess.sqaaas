config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USERNAME
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-viridian-bordeaux.sh
        container: qc.acc_tacky-silver-sponge
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-sangria-tarantula.sh
        container: qc.doc_silly-rust-avocet
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-chocolate-squirt.sh
        container: qc.doc_ready-gamboge-leopard
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.homely-pear-slug.sh
        container: qc.doc_wiggy-cerulean-retriever
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-saffron-goat.sh
        container: qc.lic_skanky-wheat-tortoise
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.gimpy-green-badger.sh
        container: qc.sec_boozy-peach-akbash
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-mauve-axolotl.sh
        container: qc.sty_jumpy-champagne-newfoundland
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.woozy-celadon-ferret.sh
        container: qc.uni_skinny-cinnabar-audemer
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.scaly-chartreuse-kangaroo.sh
        container: qc.ver_tasty-aqua-oyster
timeout: 5400
