config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USERNAME
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-cornflower-manatee.sh
        container: qc.acc_frumpy-silver-squirrel
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-maroon-mammoth.sh
        container: qc.doc_shaky-cream-dane
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.surly-red-seal.sh
        container: qc.doc_zippy-red-jaguar
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-rust-yak.sh
        container: qc.doc_stealthy-emerald-tapir
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.nerdy-pink-ray.sh
        container: qc.lic_lovely-ochre-reindeer
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-magenta-ragdoll.sh
        container: qc.sec_craggy-olive-schnauzer
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-chestnut-markhor.sh
        container: qc.sty_shabby-green-eel
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-black-wolf.sh
        container: qc.uni_stuffy-alizarin-leopard
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-fuchsia-gibbon.sh
        container: qc.ver_boozy-copper-frise
timeout: 5400
