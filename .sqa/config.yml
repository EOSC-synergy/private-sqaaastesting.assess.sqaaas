config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/private-sqaaastesting
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.prussian_harmonious_hyena.sh
        container: qc.acc_orchid_dizzy_porcupine
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.walnut_rugged_swan.sh
        container: qc.doc_sienna_energetic_cassowary
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.periwinkle_apathetic_giraffe.sh
        container: qc.doc_glaucous_reliable_swan
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.jasmine_ambitious_nymph.sh
        container: qc.doc_aquamarine_peppy_coyote
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.chartreuse_cranky_beaver.sh
        container: qc.lic_coral_nurturing_toucan
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.tundra_aware_beaver.sh
        container: qc.sec_silver_witty_grizzly
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.dusk_blissful_beaver.sh
        container: qc.sty_eggplant_smart_unicorn
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.reef_industrious_cobra.sh
        container: qc.uni_gold_polite_finch
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.mahogany_savvy_hydra.sh
        container: qc.ver_papaya_intuitive_manta
timeout: 5400
