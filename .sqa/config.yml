config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/private-sqaaastesting
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.pine_trustworthy_spren.sh
        container: qc.acc_fern_smart_groundhog
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.flint_cranky_piranha.sh
        container: qc.doc_cardamom_calm_kraken
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.rosewater_perceptive_eel.sh
        container: qc.doc_iris_confused_hornbill
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.cinnabar_mysterious_bear.sh
        container: qc.doc_seafoam_tactful_clownfish
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.cinnabar_studious_lobster.sh
        container: qc.lic_ivory_generous_stork
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.chocolate_positive_unicorn.sh
        container: qc.sec_chocolate_honest_ocelot
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.fog_content_dragon.sh
        container: qc.sty_fuchsia_aware_frog
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.hunter_carefree_eel.sh
        container: qc.uni_cyan_dedicated_gerbil
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.peach_timid_raccoon.sh
        container: qc.ver_kiwi_thoughtful_dormouse
timeout: 5400
