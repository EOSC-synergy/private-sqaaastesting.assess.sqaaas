config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/private-sqaaastesting
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.pink_romantic_unicorn.sh
        container: qc.acc_caramel_respectful_reindeer
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.cadet_brave_giraffe.sh
        container: qc.doc_steel_driven_hummingbird
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.lapis_trustworthy_moose.sh
        container: qc.doc_cinnabar_sincere_puffin
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.dusk_shrewd_boa.sh
        container: qc.doc_pansy_intuitive_frog
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.jet_mature_squid.sh
        container: qc.lic_violet_bubbly_horse
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.slate_stubborn_moose.sh
        container: qc.sec_mustard_devoted_pelican
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.byzantium_reliable_llama.sh
        container: qc.sty_pearl_thoughtful_kiwi
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.jet_delighted_hippopotamus.sh
        container: qc.uni_reef_humorous_gnu
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.tangerine_alert_mongoose.sh
        container: qc.ver_butterscotch_grateful_emu
timeout: 5400
