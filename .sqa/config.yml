config:
  credentials:
  - id: sqaaas-github-cred-test
    password_var: GIT_PASSWORD
    username_var: GIT_USERNAME
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-tomato-rabbit.sh
        container: qc.acc_lovely-saffron-raccoon
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-plum-koala.sh
        container: qc.doc_whiny-malachite-gopher
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-violet-lionfish.sh
        container: qc.doc_frumpy-silver-retriever
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-brass-armadillo.sh
        container: qc.doc_skanky-cerulean-avocet
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.frumpy-smalt-snail.sh
        container: qc.lic_queasy-taupe-russel
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-pumpkin-whale.sh
        container: qc.sec_sleazy-brass-clam
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.geeky-ecru-spoonbill.sh
        container: qc.sty_leaky-champagne-duck
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-myrtle-snake.sh
        container: qc.uni_boozy-silver-seahorse
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-khaki-pig.sh
        container: qc.ver_stinky-lime-seahorse
timeout: 5400
