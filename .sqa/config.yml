config:
  credentials:
  - id: https://github.com/PalomoIFCA/private-sqaaastesting
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private-sqaaastesting:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/private-sqaaastesting
      repo: https://github.com/PalomoIFCA/private-sqaaastesting
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.alabaster_joyful_shark.sh
        container: qc.acc_lemon_meticulous_dingo
  QC.Doc:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.yellow_methodical_condor.sh
        container: qc.doc_dahlia_carefree_groundhog
      github.com/PalomoIFCA/private-sqaaastesting git:
        commands:
        - /usr/bin/env sh .sqa/script.eggplant_honest_pelican.sh
        container: qc.doc_strawberry_sympathetic_lemur
      github.com/PalomoIFCA/private-sqaaastesting markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.claret_enigmatic_kingfisher.sh
        container: qc.doc_sunset_forgiving_toucan
  QC.Lic:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting licensee:
        commands:
        - /usr/bin/env sh .sqa/script.jet_thankful_cormorant.sh
        container: qc.lic_walnut_sociable_manta
  QC.Sec:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting bandit:
        commands:
        - /usr/bin/env sh .sqa/script.tundra_tough_seahorse.sh
        container: qc.sec_alabaster_stubborn_stork
  QC.Sty:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting flake8:
        commands:
        - /usr/bin/env sh .sqa/script.red_reliable_uakari.sh
        container: qc.sty_salmon_sad_snail
  QC.Uni:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting pytest:
        commands:
        - /usr/bin/env sh .sqa/script.snow_foolish_marmoset.sh
        container: qc.uni_olive_independent_hare
  QC.Ver:
    repos:
      github.com/PalomoIFCA/private-sqaaastesting get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.viridian_thoughtful_grasshopper.sh
        container: qc.ver_emerald_tranquil_ibex
timeout: 5400
